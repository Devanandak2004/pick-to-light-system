<!DOCTYPE html>


<html>

<head>
    <title>Pick To Light System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">


        <div class="header-left">

            <h1>PICK TO LIGHT SYSTEM</h1>

            <p>
                Smart Supermarket Replenishment Solution
            </p>

        </div>

        <div class="header-right">

            <h2>DEV ELECTRIC</h2>

            <p>Methods Engineering Team</p>

            <p>Developed By: Devananda K</p>

            <p>Version 1.0</p>

        </div>


    </div>

    <div class="scanner-section">


        <h2>Scan QR Code</h2>
        <div class="connection-status">

            <span id="statusDot"></span>

            <span id="statusText">
            Checking...
        </span>

        </div>

        <div id="reader"></div>

        <div id="scanStatus"></div>

        <button onclick="restartScanner()">
    Scan Again
</button>


    </div>

    <div class="search-section">


        <input type="text" id="partInput" placeholder="Enter Part Number">

        <button onclick="findPart()">
    Search
</button>

    </div>

    <div class="part-card">


        <h2>Part Information</h2>

        <div id="result"></div>

    </div>

    <div class="buttons">


        <button onclick="exportHistory()">
    Export History
</button>

        <button onclick="clearHistory()">
    Clear History
</button>

    </div>

    <h2>Scan History</h2>

    <table id="historyTable">


        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Part Number</th>
            <th>Location</th>
        </tr>

    </table>

    </table>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="script.js"></script>


</body>

</html>
