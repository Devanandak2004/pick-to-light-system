<!DOCTYPE html>


<html>

<head>
    <title>Pick To Light System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    ```
    <h1>Pick To Light System</h1>

    <h2>Scan QR Code</h2>

    <div id="reader" style="width:300px;"></div>

    <div id="scanStatus"></div>

    <button onclick="restartScanner()">
    Scan Again
</button>

    <br><br>

    <input type="text" id="partInput" placeholder="Enter Part Number">

    <button onclick="findPart()">
    Search
</button>

    <button onclick="exportHistory()">
    Export History
</button>

    <button onclick="clearHistory()">
    Clear History
</button>

    <div id="result"></div>

    <h2>Scan History</h2>

    <table border="1" id="historyTable">

        <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Part Number</th>
            <th>Location</th>
        </tr>

    </table>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="script.js"></script>
    ```

</body>

</html>
